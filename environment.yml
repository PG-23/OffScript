name: offscript

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # Data manipulation
  - pandas
  - numpy
  - pyarrow

  # Machine learning
  - scikit-learn
  - xgboost
  - shap

  # Visualisation
  - matplotlib
  - seaborn

  # Notebook environment
  - jupyterlab
  - ipykernel
  - ipywidgets

  # Utilities
  - joblib
  - scipy
  - requests
  - tqdm

  # Pip-only packages
  - pip
  - pip:
      - pybaseball==2.2.7
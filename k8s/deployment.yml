# k8s/deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: offscript-api
  namespace: offscript
  labels:
    app: offscript-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: offscript-api
  template:
    metadata:
      labels:
        app: offscript-api
    spec:
      containers:
        - name: offscript-api
          image: offscript-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: offscript-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3